server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html 200.html;

    # gzip圧縮
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # 静的アセット（ハッシュ付き）は長期キャッシュ
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: 存在しないパスはすべて 200.html へ
    location / {
        try_files $uri $uri/ /200.html;
    }
}
